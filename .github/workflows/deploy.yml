name: CI/CD · Build & Deploy to AWS ECR

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Garante que apenas um deploy rode por vez — cancela runs anteriores em progresso
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1: Testes e validação (roda em PRs e pushes)
  # ---------------------------------------------------------------------------
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Descomente quando tiver testes configurados:
      # - name: Run tests
      #   run: npm test

      - name: Validate Dockerfile syntax
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          ignore: DL3008,DL3018

  # ---------------------------------------------------------------------------
  # JOB 2: Build e Push da imagem (apenas em push para main)
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    # Permissões mínimas necessárias (princípio do menor privilégio)
    permissions:
      contents: read
      id-token: write  # Para OIDC authentication (recomendado no lugar de chaves estáticas)

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      ecr-registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Gera tags semânticas: latest + SHA curto do commit
      # Ex: myapp:latest e myapp:a1b2c3d — permite rollback preciso
      - name: Generate image metadata & tags
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "version=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG_LATEST=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest" >> $GITHUB_ENV
          echo "IMAGE_TAG_SHA=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${SHORT_SHA}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Dupla tag: rollback via SHA + convenção de latest
          tags: |
            ${{ env.IMAGE_TAG_LATEST }}
            ${{ env.IMAGE_TAG_SHA }}
          # Cache de build entre runs — reduz tempo de CI em até 70%
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Metadados de proveniência (rastreabilidade)
          provenance: true
          sbom: true

      - name: Image vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_TAG_SHA }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true  # Não bloqueia o pipeline, mas gera alerta

      - name: Summary
        run: |
          echo "### Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "| ----- | ----- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Registry** | ${{ steps.login-ecr.outputs.registry }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Repository** | ${{ env.ECR_REPOSITORY }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image tag** | ${{ steps.meta.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY

